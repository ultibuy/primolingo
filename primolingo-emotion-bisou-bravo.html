<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>PrimoLingo — Bisou & Bravo (mode 5)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 48px 32px 80px;
    background: #0a0a14;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: #fff;
    min-height: 100vh;
  }
  .wrap { max-width: 1000px; margin: 0 auto; }
  .header {
    margin-bottom: 32px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .header-tag {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fbbf24;
  }
  h1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 28px;
    margin: 4px 0 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
  }
  .card {
    background: rgba(255,255,255,0.025);
    border: 1.5px dashed rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 28px 24px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
  }
  .icon-tile {
    width: 96px;
    height: 96px;
    border-radius: 14px;
    background: rgba(167,139,250,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .label {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .price {
    color: #fbbf24;
    font-weight: 700;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .price::after {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #fbbf24;
    margin-left: 2px;
  }
  .desc {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
    max-width: 220px;
  }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    margin-top: -8px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div>
      <div class="header-tag">Émotions · mode 5 (chibi)</div>
      <h1>Bisou &amp; Bravo</h1>
    </div>
  </div>

  <div class="grid">

    <!-- ============ Bisou ============ -->
    <div class="card">
      <div class="icon-tile">
        <svg viewBox="0 0 96 96" width="80" height="80">
          <defs>
            <linearGradient id="bisou-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#c4b5fd"/>
              <stop offset="1" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <!-- Face -->
          <circle cx="38" cy="50" r="24" fill="url(#bisou-grad)"/>
          <!-- Eyes closed (sweet ^^) -->
          <path d="M27 45 Q31 49 35 45" stroke="#1e1e2e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M41 45 Q45 49 49 45" stroke="#1e1e2e" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <!-- Cheeks -->
          <circle cx="22" cy="56" r="3" fill="#fbbf24" opacity="0.55"/>
          <circle cx="54" cy="56" r="3" fill="#fbbf24" opacity="0.55"/>
          <!-- Pursed kiss lips (small heart-like 'o') -->
          <ellipse cx="38" cy="60" rx="2.8" ry="3.5" fill="#ff6b9d"/>
          <!-- Big floating heart (kiss being sent) -->
          <g transform="translate(76 32)">
            <path d="M0 10 C0 10, -12 0, -12 -8 C-12 -13, -7 -15, -3.5 -12 L0 -8.5 L3.5 -12 C7 -15, 12 -13, 12 -8 C12 0, 0 10, 0 10 Z" fill="#ff6b9d"/>
          </g>
          <!-- Small heart (trail) -->
          <g transform="translate(86 56) scale(0.55)">
            <path d="M0 10 C0 10, -12 0, -12 -8 C-12 -13, -7 -15, -3.5 -12 L0 -8.5 L3.5 -12 C7 -15, 12 -13, 12 -8 C12 0, 0 10, 0 10 Z" fill="#ff6b9d" opacity="0.7"/>
          </g>
          <!-- Tiny heart (smallest) -->
          <g transform="translate(78 76) scale(0.35)">
            <path d="M0 10 C0 10, -12 0, -12 -8 C-12 -13, -7 -15, -3.5 -12 L0 -8.5 L3.5 -12 C7 -15, 12 -13, 12 -8 C12 0, 0 10, 0 10 Z" fill="#ff6b9d" opacity="0.5"/>
          </g>
        </svg>
      </div>
      <div class="label">Bisou <span class="price">130</span></div>
      <p class="desc">Yeux fermés ^^, lèvres pincées, trois cœurs roses qui s'envolent — le bisou qui part.</p>
      <div class="meta">visage chibi + 3 cœurs</div>
    </div>

    <!-- ============ Bravo ============ -->
    <div class="card">
      <div class="icon-tile">
        <svg viewBox="0 0 96 96" width="80" height="80">
          <defs>
            <linearGradient id="bravo-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#c4b5fd"/>
              <stop offset="1" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <!-- Face -->
          <circle cx="38" cy="44" r="22" fill="url(#bravo-grad)"/>
          <!-- Sparkle eyes (excited "wow!") -->
          <g transform="translate(30 41)">
            <path d="M0 -4.5 L1.2 -1.2 L4.5 -1 L1.5 1 L2.5 4.5 L0 2.5 L-2.5 4.5 L-1.5 1 L-4.5 -1 L-1.2 -1.2 Z" fill="#fbbf24"/>
          </g>
          <g transform="translate(46 41)">
            <path d="M0 -4.5 L1.2 -1.2 L4.5 -1 L1.5 1 L2.5 4.5 L0 2.5 L-2.5 4.5 L-1.5 1 L-4.5 -1 L-1.2 -1.2 Z" fill="#fbbf24"/>
          </g>
          <!-- Big open smile -->
          <path d="M28 50 Q38 60 48 50 Q44 56 38 56 Q32 56 28 50 Z" fill="#1e1e2e"/>
          <!-- Tongue accent -->
          <path d="M34 53 Q38 56 42 53" fill="#ff6b9d" stroke="none"/>
          <!-- Cheeks -->
          <circle cx="22" cy="50" r="3" fill="#fbbf24" opacity="0.55"/>
          <circle cx="54" cy="50" r="3" fill="#fbbf24" opacity="0.55"/>
          <!-- Two clapping hands below face -->
          <!-- Left hand -->
          <g transform="translate(26 78) rotate(-20)">
            <path d="M-7 -7 L5 -7 Q8 -7, 8 -4 L8 6 Q8 9, 5 9 L-7 9 Q-10 9, -10 6 L-10 -4 Q-10 -7, -7 -7 Z" fill="url(#bravo-grad)"/>
            <!-- Finger detail -->
            <line x1="-3" y1="-7" x2="-3" y2="-2" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
            <line x1="1" y1="-7" x2="1" y2="-2" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
            <line x1="5" y1="-7" x2="5" y2="-2" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
          </g>
          <!-- Right hand (mirrored) -->
          <g transform="translate(50 78) rotate(20)">
            <path d="M-5 -7 L7 -7 Q10 -7, 10 -4 L10 6 Q10 9, 7 9 L-5 9 Q-8 9, -8 6 L-8 -4 Q-8 -7, -5 -7 Z" fill="url(#bravo-grad)"/>
            <line x1="-1" y1="-7" x2="-1" y2="-2" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
            <line x1="3" y1="-7" x2="3" y2="-2" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
            <line x1="7" y1="-7" x2="7" y2="-2" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
          </g>
          <!-- Sparkle (top right) -->
          <g transform="translate(76 22)">
            <path d="M0 -6 L1.5 -1.5 L6 -1.2 L2 1.5 L3 6 L0 3.5 L-3 6 L-2 1.5 L-6 -1.2 L-1.5 -1.5 Z" fill="#fbbf24"/>
          </g>
          <!-- Sparkle (top left, smaller) -->
          <g transform="translate(14 24) scale(0.6)">
            <path d="M0 -6 L1.5 -1.5 L6 -1.2 L2 1.5 L3 6 L0 3.5 L-3 6 L-2 1.5 L-6 -1.2 L-1.5 -1.5 Z" fill="#fbbf24" opacity="0.85"/>
          </g>
          <!-- Action lines around hands -->
          <path d="M16 80 L10 84" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
          <path d="M62 80 L68 84" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        </svg>
      </div>
      <div class="label">Bravo <span class="price">130</span></div>
      <p class="desc">Yeux étoilés ⭐, sourire ouvert, deux mains qui claquent — l'applaudissement.</p>
      <div class="meta">visage chibi + clap + ✦</div>
    </div>

  </div>

</div>

</body>
</html>
